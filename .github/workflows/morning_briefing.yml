name: Morning Briefing (통합)

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 KST 07:00 (UTC 22:00 전날)
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD, empty for today)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate morning briefing
        env:
          GOOGLE_SERVICE_JSON_B64: ${{ secrets.GOOGLE_SERVICE_JSON_B64 }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          WOO_BASE_URL: ${{ secrets.WOO_BASE_URL }}
          WOO_CK: ${{ secrets.WOO_CK }}
          WOO_CS: ${{ secrets.WOO_CS }}
          FX_USE_LIVE: "1"
          DAILY_SUMMARY_ENABLED: "1"
          TELEGRAM_ENABLED: "1"
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python -m src.dashboard.cli --action morning-briefing --date "$DATE_ARG"
          else
            python -m src.dashboard.cli --action morning-briefing
          fi
