name: KOHGANE Naver Sync

on:
  schedule:
    # 매일 새벽 3시 KST = UTC 18:00 전날
    - cron: '0 18 * * *'
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install requests bcrypt
      
      - name: Run sync
        env:
          NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
          NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python automation/api_sync/naver_commerce_sync.py
