name: FX Rate Update

on:
  schedule:
    - cron: "30 0,6,12,18 * * *"   # 하루 4회 (UTC: 00:30, 06:30, 12:30, 18:30)
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: update, recalculate, history, check-changes'
        required: false
        default: 'update'
        type: choice
        options:
          - update
          - recalculate
          - history
          - check-changes
      force:
        description: 'Force refresh (ignore cache)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean

jobs:
  fx-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FX CLI
        env:
          GOOGLE_SERVICE_JSON_B64: ${{ secrets.GOOGLE_SERVICE_JSON_B64 }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          SHOPIFY_LOCATION_ID: ${{ secrets.SHOPIFY_LOCATION_ID }}
          WOO_BASE_URL: ${{ secrets.WOO_BASE_URL }}
          WOO_CK: ${{ secrets.WOO_CK }}
          WOO_CS: ${{ secrets.WOO_CS }}
          WOO_API_VERSION: ${{ secrets.WOO_API_VERSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
          FX_PROVIDER: ${{ vars.FX_PROVIDER || 'frankfurter' }}
          FX_USE_LIVE: '1'
          FX_CACHE_TTL: ${{ vars.FX_CACHE_TTL || '3600' }}
          FX_CHANGE_ALERT_PCT: ${{ vars.FX_CHANGE_ALERT_PCT || '3.0' }}
          FX_CNYKRW: ${{ vars.FX_CNYKRW || '190' }}
          TARGET_MARGIN_PCT: ${{ vars.TARGET_MARGIN_PCT || '22' }}
        run: |
          ACTION="${{ github.event.inputs.action || 'update' }}"
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --dry-run"
          fi
          python -m src.fx.cli --action "$ACTION" $EXTRA_FLAGS
          
