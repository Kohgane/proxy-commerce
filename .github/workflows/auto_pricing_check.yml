name: Auto Pricing Check

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 07:00 KST (UTC 22:00 전날)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pricing mode (DRY_RUN or APPLY)'
        required: false
        default: 'DRY_RUN'
        type: string

permissions:
  contents: read

jobs:
  auto-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run auto pricing check
        env:
          GOOGLE_SERVICE_JSON_B64: ${{ secrets.GOOGLE_SERVICE_JSON_B64 }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          WOO_BASE_URL: ${{ secrets.WOO_BASE_URL }}
          WOO_CK: ${{ secrets.WOO_CK }}
          WOO_CS: ${{ secrets.WOO_CS }}
          AUTO_PRICING_ENABLED: "1"
          AUTO_PRICING_MODE: ${{ github.event.inputs.mode || 'DRY_RUN' }}
          MIN_MARGIN_PCT: "10"
          MAX_PRICE_CHANGE_PCT: "8"
          TELEGRAM_ENABLED: "1"
        run: python -m src.analytics.cli --action auto-pricing
