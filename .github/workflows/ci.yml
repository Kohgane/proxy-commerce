name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
      - run: python -m flake8 src/ tests/ --select=F --statistics  # Fatal errors only

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    env:
      TRANSLATE_PROVIDER: none
      SHOPIFY_CLIENT_SECRET: test-secret
      SHOPIFY_SHOP: test.myshopify.com
      SHOPIFY_ACCESS_TOKEN: test-token
      WOO_BASE_URL: https://test.example.com
      WOO_CK: ck_test
      WOO_CS: cs_test
      FX_USE_LIVE: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: proxy-commerce:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
