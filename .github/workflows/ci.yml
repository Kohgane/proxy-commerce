name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 충돌 마커 검출
        run: |
          found=0
          for d in src tests templates static; do
            if [ -d "$d" ]; then
              if grep -rnE '^(<{7}|={7}|>{7})( |$)' "$d"; then
                found=1
              fi
            fi
          done
          if [ "$found" -eq 1 ]; then
            echo "::error::머지 충돌 마커 발견"
            exit 1
          fi

      - name: Python syntax 사전 컴파일
        run: python -m compileall src/ -q

      - name: pytest collect clean
        run: python -m pytest --collect-only -q
