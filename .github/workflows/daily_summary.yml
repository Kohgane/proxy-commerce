name: Daily Summary Report

on:
  schedule:
    - cron: "0 13 * * *"   # 매일 KST 22:00 (UTC 13:00)
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD, empty for today)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate daily summary
        env:
          GOOGLE_SERVICE_JSON_B64: ${{ secrets.GOOGLE_SERVICE_JSON_B64 }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          DAILY_SUMMARY_ENABLED: "1"
          TELEGRAM_ENABLED: "1"
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python -m src.dashboard.cli --action daily-summary --date "$DATE_ARG"
          else
            python -m src.dashboard.cli --action daily-summary
          fi
