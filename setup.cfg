[flake8]
max-line-length = 120
ignore = E501,W503,W504,E402

[tool:pytest]
testpaths = tests
addopts = --cov=src --cov-report=term-missing --cov-report=html:htmlcov --cov-fail-under=0

[coverage:run]
source = src
omit =
    src/main.py
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise NotImplementedError
