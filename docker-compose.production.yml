version: "3.9"

services:
  web:
    build:
      context: .
      args:
        APP_ENV: production
    ports:
      - "8000:8000"
    env_file: .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      args:
        APP_ENV: production
    command: python -m src.main
    env_file: .env.production
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
