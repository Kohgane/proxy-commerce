<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이메일 로그인 — 코가네 퍼센티</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f7fa; }
    .magic-card { max-width: 460px; margin: 80px auto; }
  </style>
</head>
<body>
<div class="magic-card">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h4 class="fw-bold text-center mb-1">📧 이메일 로그인</h4>
      <p class="text-center text-muted small mb-4">OAuth 로그인이 안 될 때 사용하세요.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="/auth/magic-link">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="mb-3">
          <label class="form-label small">이메일</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인 링크 보내기</button>
      </form>

      <div class="alert alert-light border mt-3 mb-0 small">
        <div class="fw-semibold mb-1">보안 메모</div>
        <ul class="mb-0 ps-3">
          <li>링크는 15분 동안만 유효합니다.</li>
          <li>한 번 사용하면 다시 사용할 수 없습니다.</li>
          <li>본인이 요청하지 않았다면 메일을 무시하세요.</li>
        </ul>
      </div>
    </div>
  </div>
  <p class="text-center text-muted small mt-3 mb-0">
    <a href="/auth/login" class="text-decoration-none">← 로그인으로 돌아가기</a>
    &nbsp;·&nbsp;
    <a href="/privacy" class="text-decoration-none">개인정보처리방침</a>
    &nbsp;·&nbsp;
    <a href="/terms" class="text-decoration-none">이용약관</a>
  </p>
</div>
</body>
</html>
