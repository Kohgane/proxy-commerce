<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostic Token 발급됨</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<main class="container py-5" style="max-width:900px;">
  <div class="alert alert-danger fw-semibold fs-5">⚠️ 본인만 사용. 1회용. {{ ttl_minutes }}분 유효.</div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">🆘 비상 진입용 링크가 발급되었습니다</h1>
      <p class="text-muted mb-3">발급 IP: <code>{{ issuer_ip or "-" }}</code></p>
      <a href="{{ redeem_url }}" class="btn btn-danger btn-lg w-100 py-3 mb-3">→ Admin 세션 시작</a>
      <p class="small mb-1">직접 복사:</p>
      <code style="word-break:break-all;">{{ redeem_url }}</code>
      <hr>
      <p class="mb-1">만료까지: <span id="countdown" class="fw-bold text-danger">{{ ttl_minutes }}:00</span></p>
      <p class="small text-muted mb-0">사용 후 환경변수 <code>DIAGNOSTIC_REVEAL=0</code> 으로 되돌리는 것을 권장합니다.</p>
    </div>
  </div>
</main>
<script>
  let left = {{ ttl_minutes|int }} * 60;
  const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    left -= 1;
    if (left <= 0) {
      el.textContent = '만료됨';
      clearInterval(timer);
      return;
    }
    const m = Math.floor(left / 60);
    const s = left % 60;
    el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  }, 1000);
</script>
</body>
</html>
