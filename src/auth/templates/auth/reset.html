<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 재설정 — 코가네 퍼센티</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f7fa; }
    .auth-card { max-width: 420px; margin: 80px auto; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-3">🔑 비밀번호 재설정</h5>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="/auth/reset">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="mb-3">
          <label class="form-label small">새 비밀번호 (8자 이상)</label>
          <input type="password" name="password" class="form-control" required minlength="8">
        </div>
        <div class="mb-3">
          <label class="form-label small">비밀번호 확인</label>
          <input type="password" name="confirm" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary w-100">비밀번호 변경</button>
      </form>
      <div class="text-center mt-3 small">
        <a href="/auth/login">← 로그인으로 돌아가기</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
