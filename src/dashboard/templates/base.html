<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin{% endblock %} — proxy-commerce</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/admin/static/css/style.css">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar p-3" style="min-height:100vh;background:#212529;">
      <h5 class="text-white mb-3">🛒 Admin</h5>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link text-secondary" href="/admin/">대시보드</a></li>
        <li class="nav-item"><a class="nav-link text-secondary" href="/admin/products">상품 목록</a></li>
        <li class="nav-item"><a class="nav-link text-secondary" href="/admin/orders">주문 목록</a></li>
        <li class="nav-item"><a class="nav-link text-secondary" href="/admin/inventory">재고 현황</a></li>
      </ul>
    </nav>
    <main class="col-md-10 p-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/static/js/app.js"></script>
</body>
</html>
