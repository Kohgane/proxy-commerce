project:
  mode: "APPLY"   # APPLY | DRY_RUN
  locale_primary: "ko"
  locale_secondary: "en"

catalog:
  source: "google_sheets"
  sheet_id: "${GOOGLE_SHEET_ID}"
  worksheet: "catalog"

media:
  cloudinary:
    cloud_name: "${CLOUDINARY_CLOUD_NAME}"
    api_key: "${CLOUDINARY_API_KEY}"
    api_secret: "${CLOUDINARY_API_SECRET}"
    folder: "proxy-commerce"

shopify:
  enabled: true
  shop: "${SHOPIFY_SHOP}"
  access_token: "${SHOPIFY_ACCESS_TOKEN}"
  location_id: "${SHOPIFY_LOCATION_ID}"
  currency: "USD"

woocommerce:
  enabled: true
  base_url: "${WOO_BASE_URL}"
  consumer_key: "${WOO_CK}"
  consumer_secret: "${WOO_CS}"
  currency: "KRW"
  api_version: "${WOO_API_VERSION}"
  webhook_secret: "${WOO_WEBHOOK_SECRET}"
  batch_size: 10
  shipping_class: "overseas"
  default_stock_manage: true

pricing:
  target_margin_pct: ${TARGET_MARGIN_PCT}
  fx_source: "${FX_SOURCE}"
  fx_usdkrw: ${FX_USDKRW}
  fx_jpykrw: ${FX_JPYKRW}        # 신규: JPY→KRW 환율
  fx_eurkrw: ${FX_EURKRW}        # 신규: EUR→KRW 환율
  shipping_fee_default: ${SHIPPING_FEE_DEFAULT}
  forwarder_fee_jpy: ${FORWARDER_FEE_JPY}  # 신규: 젠마켓 수수료 (엔)
  customs_threshold_krw: 150000   # 신규: 관부가세 면세 기준 (원)
  customs_rate_default: 0.20      # 신규: 기본 관부가세율

translation:
  provider: "${TRANSLATE_PROVIDER}"   # deepl | papago | none
  deepl:
    api_key: "${DEEPL_API_KEY}"
    api_url: "${DEEPL_API_URL}"       # https://api-free.deepl.com/v2/translate
  cache_enabled: true

orders:
  router: "task"  # api | task
  notify:
    email:
      enabled: ${EMAIL_ENABLED}
    telegram:
      enabled: ${TELEGRAM_ENABLED}

channels:
  percenty:
    warehouse_address: "${WAREHOUSE_ADDRESS}"
    return_address: "${RETURN_ADDRESS}"
    markets:
      coupang:
        margin_adjust: ${COUPANG_MARGIN_ADJUST}
        commission_rate: 10.8
      smartstore:
        margin_adjust: ${NAVER_MARGIN_ADJUST}
        commission_rate: 5.0
      11st:
        margin_adjust: -1.0
        commission_rate: 12.0
  shopify:
    markets_enabled: ${SHOPIFY_MARKETS_ENABLED}
  woocommerce:
    brand_collections: true

dashboard:
  orders_worksheet: orders
  daily_summary_enabled: true
  alerts:
    stale_order_days: 7
    forwarder_days: 5
    fx_change_threshold_pct: 3.0
  revenue:
    low_margin_threshold: 15.0
    high_margin_threshold: 35.0


inventory:
  sync_enabled: true
  check_delay_seconds: 2
  check_timeout_seconds: 15
  low_stock_threshold: 3
  price_change_threshold_pct: 5.0
  auto_deactivate_on_stockout: true
  vendors:
    porter:
      stock_patterns:
        in_stock: ["カートに入れる", "add to cart"]
        out_of_stock: ["売り切れ", "sold out"]
    memo_paris:
      stock_patterns:
        in_stock: ["add to bag", "add to cart", "ajouter au panier"]
        out_of_stock: ["out of stock", "sold out", "rupture de stock"]

fx:
  provider: frankfurter
  use_live: true
  cache_ttl_seconds: 3600
  change_alert_pct: 3.0
  history_worksheet: fx_history
  rates_worksheet: fx_rates
  supported_pairs:
    - USDKRW
    - JPYKRW
    - EURKRW

analytics:
  auto_pricing:
    enabled: true
    mode: "DRY_RUN"  # DRY_RUN | APPLY
    min_margin_pct: 10
    max_price_change_pct: 8
    check_interval_hours: 24
  reorder:
    enabled: true
    sales_velocity_days: 30
    safety_stock_days: 3
    lead_times:
      porter: 7
      memo_paris: 10
  new_products:
    enabled: true
    min_margin_pct: 15
  reports:
    weekly_enabled: true
    monthly_enabled: true
    weekly_worksheet: weekly_reports
    monthly_worksheet: monthly_reports

deploy:
  environments:
    staging:
      mode: "DRY_RUN"
      gunicorn_workers: 1
      log_level: "debug"
    production:
      mode: "APPLY"
      gunicorn_workers: 4
      log_level: "warning"
  healthcheck:
    path: "/health"
    ready_path: "/health/ready"
    timeout_seconds: 10
    retries: 5
    interval_seconds: 15
  notifications:
    telegram_on_deploy: true
    telegram_on_failure: true
    telegram_on_rollback: true

bot:
  commands_enabled: true
  webhook_secret: "${TELEGRAM_BOT_WEBHOOK_SECRET}"

notifications:
  customer:
    enabled: false
    smtp:
      host: "${SMTP_HOST}"
      port: 587
      user: "${SMTP_USER}"
      from_name: "Proxy Commerce"
      from_email: "${SMTP_FROM_EMAIL}"
  channels:
    slack:
      enabled: false
      webhook_url: "${SLACK_WEBHOOK_URL}"
    discord:
      enabled: false
      webhook_url: "${DISCORD_WEBHOOK_URL}"

reorder:
  enabled: false
  threshold: 2
  worksheet: reorder_queue
  approval_required: true

# === Phase 10: 성능 최적화 + 보안 강화 ===
rate_limiting:
  enabled: true
  default: "60/minute"
  webhook: "100/minute"
  bot: "30/minute"

request_logging:
  level: "info"
  mask_fields:
    - api_key
    - token
    - secret
    - password
    - authorization

security:
  max_content_length: 1048576  # 1MB
  hsts_enabled: false
  cors_allowed_origins: "*"

cache:
  enabled: true
  max_size: 1000
  default_ttl: 300

circuit_breaker:
  enabled: true
  failure_threshold: 5
  timeout: 60

audit:
  enabled: true
  worksheet: audit_log

# === Phase 11: 관리자 대시보드 API + 데이터 내보내기 + 운영 CLI ===
api:
  dashboard_enabled: true
  cors_origins: "*"
  pagination_default: 20
  pagination_max: 100

export:
  enabled: true
  worksheet: daily_exports
  daily_enabled: true
  weekly_enabled: true
  csv_encoding: utf-8-sig

cli:
  output_format: table
  color_enabled: true

# === Phase 12: 플러그인 + 마이그레이션 + 프로파일링 ===
plugins:
  enabled: true
  auto_load: true
  vendors:
    porter:
      enabled: true
    memo_paris:
      enabled: true

migration:
  auto_check: false
  backup_enabled: true
  schema_version_worksheet: schema_version

profiling:
  enabled: false
  slow_threshold_ms: 5000
  metrics_enabled: true

config:
  hot_reload: false
  check_interval: 60
  strict_validation: false

# === Phase 14: Reviews ===
reviews:
  collection_enabled: false
  auto_response_enabled: false
  negative_threshold: 2
  sheet_name: reviews

# === Phase 14: Promotions ===
promotions:
  enabled: false
  stack_mode: best  # best | stack
  sheet_name: promotions

# === Phase 14: CRM ===
crm:
  enabled: false
  lifecycle_enabled: false
  sheet_name: customers
  vip_min_orders: 3
  vip_min_spent: 1000000
  at_risk_days: 90
  dormant_days: 180

# === Phase 15: 마케팅 자동화 ===
marketing:
  enabled: false
  sheet_name: campaigns
  ab_testing_enabled: false
  email_batch_size: 50
  email_delay_sec: 2

# === Phase 15: 리포팅 ===
reporting:
  enabled: false
  daily: true
  weekly: true
  monthly: true
  sheet_name: reports

# === Phase 15: SEO ===
seo:
  enabled: false
  default_language: ko
  site_name: Proxy Commerce
  site_url: https://example.com

# === Phase 15: 웹훅 허브 ===
webhooks:
  hub_enabled: false
  retry_enabled: false
  retry_max: 3

# === Phase 16: 경쟁사 분석 ===
competitor:
  tracking_enabled: false
  sheet_name: competitors
  price_alert_threshold_pct: 5

# === Phase 16: 수요 예측 ===
forecasting:
  enabled: false
  min_data_days: 30
  stock_safety_factor: 1.5
  stock_lead_time_days: 7

# === Phase 16: 워크플로 자동화 ===
automation:
  enabled: false
  sheet_name: automation_rules
  scheduler_enabled: false

# === Phase 17: 상품 수집기 ===
collectors:
  timeout: ${COLLECTOR_TIMEOUT}
  delay: ${COLLECTOR_DELAY}
  max_retries: ${COLLECTOR_MAX_RETRIES}
  user_agent: "${COLLECTOR_USER_AGENT}"
  import:
    margin_pct: ${IMPORT_MARGIN_PCT}
    shipping_base_krw: ${IMPORT_SHIPPING_BASE_KRW}
    shipping_per_kg_krw: ${IMPORT_SHIPPING_PER_KG_KRW}
    customs_threshold_krw: ${IMPORT_CUSTOMS_THRESHOLD_KRW}
    customs_rate_pct: ${IMPORT_CUSTOMS_RATE_PCT}
  amazon:
    supported_countries:
      - US
      - JP
    category_map_enabled: true
  collected_worksheet: "${COLLECTED_WORKSHEET}"

# === Phase 21: 주문 알림 텔레그램 강화 ===
order_alerts:
  enabled: true
  telegram_bot_token: "${ORDER_ALERT_TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${ORDER_ALERT_TELEGRAM_CHAT_ID}"

# === Phase 22: 결제/정산 시스템 ===
payments:
  enabled: false
  pg_provider: toss
  toss_secret_key: "${TOSS_PAYMENTS_SECRET_KEY}"
  toss_client_key: "${TOSS_PAYMENTS_CLIENT_KEY}"
  fee_rates:
    coupang: 0.108
    naver: 0.055
    shopify: 0.02
    woo: 0.0

# === Phase 23: 모니터링 대시보드 ===
monitoring:
  enabled: true
  alert_error_threshold: 100
  alert_latency_threshold_seconds: 2.0

# === Phase 24: OAuth + API Key 관리 ===
auth:
  jwt_secret_key: "${JWT_SECRET_KEY}"
  jwt_access_expire_minutes: 15
  jwt_refresh_expire_days: 7
  oauth:
    google:
      client_id: "${GOOGLE_OAUTH_CLIENT_ID}"
      client_secret: "${GOOGLE_OAUTH_CLIENT_SECRET}"
    kakao:
      client_id: "${KAKAO_OAUTH_CLIENT_ID}"
      client_secret: "${KAKAO_OAUTH_CLIENT_SECRET}"

# === Phase 25: 프론트엔드 관리자 패널 ===
admin_panel:
  enabled: true
  max_items: 200

# === Phase 26: 성능 최적화 + 스케일링 ===
performance:
  cache_default_ttl: 300
  async_task_max_retries: 3
  connection_pool_size: 5

# === Phase 27: 배송 추적 시스템 ===
shipping_tracking:
  enabled: true
  carriers:
    - cj
    - hanjin
    - koreapost

# === Phase 28: 고객 서비스 (CS) 시스템 ===
customer_service:
  sla_alert_hours: 24
  sla_escalate_hours: 48

# === Phase 29: 데이터 분석 + 리포팅 ===
analytics:
  enabled: true
  export_path: /tmp/reports

# === Phase 30: CI/CD 파이프라인 ===
cicd:
  smoke_test_base_url: "${SMOKE_TEST_BASE_URL}"

# === Phase 31: 재고 동기화 ===
inventory_sync:
  conflict_strategy: conservative  # conservative | last_write_wins
  channels:
    - coupang
    - naver
    - internal

# === Phase 32: 번역 관리 ===
translation:
  default_src_lang: en
  default_tgt_lang: ko
  provider: google  # google | manual

# === Phase 33: 자동 가격 엔진 ===
pricing_engine:
  default_margin_rate: 0.30
  default_channel_fee_rate: 0.05
  alert_threshold_pct: 20.0

# === Phase 34: 공급자 관리 ===
suppliers:
  scoring:
    quality_weight: 0.40
    delivery_weight: 0.30
    price_weight: 0.30

# === Phase 35: 알림 허브 ===
notification_hub:
  channels:
    telegram:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
    slack:
      webhook_url: "${SLACK_WEBHOOK_URL}"
    email:
      smtp_host: "${SMTP_HOST}"
      smtp_port: 587

# === Phase 37: 반품/교환 관리 ===
returns:
  default_shipping_deduction: 3000  # 배송비 공제 (원)
  inspection_grades: [A, B, C, D]
  refund_ratios: {A: 1.0, B: 0.9, C: 0.7, D: 0.0}

# === Phase 38: 쿠폰/프로모션 ===
coupons:
  code_length: 8
  safe_chars: true
  default_prefix: ""

# === Phase 39: 카테고리/태그 ===
categories:
  breadcrumb_separator: " > "
  platforms: [coupang, naver, internal]

# === Phase 40: 작업 스케줄러 ===
scheduler:
  max_job_history: 1000
  default_retry_max: 3
  default_retry_base_delay: 1.0
  default_retry_backoff: 2.0

# === Phase 41: 감사 로그 확장 ===
audit_store:
  max_records: 10000
  backup_enabled: false
  backup_path: "data/audit.jsonl"

# === Phase 42: 데이터 마이그레이션 ===
migration:
  seed_products: 50
  seed_orders: 30
  seed_customers: 20
  export_path: "data/exports"

# === Phase 43: 위시리스트 ===
wishlist:
  max_per_user: 10
  max_items_per_list: 100
  price_watch_history_days: 30

# === Phase 44: 번들 ===
bundles:
  suggestion_min_frequency: 2
  suggestion_top_n: 10

# === Phase 45: 멀티통화 + PG ===
multicurrency:
  base_currency: KRW
  fx_cache_ttl: 3600
  supported: [KRW, USD, JPY, CNY, EUR]

payment_gateway:
  default: toss
  currency_routing:
    KRW: toss
    USD: stripe
    EUR: stripe
    JPY: paypal
    CNY: paypal

# === Phase 46: 이미지 관리 ===
images:
  max_gallery_per_product: 10
  resize_specs:
    thumbnail: {width: 150, height: 150}
    medium: {width: 600, height: 600}
    large: {width: 1200, height: 1200}

# === Phase 47: 사용자 프로필 ===
users:
  max_addresses: 5
  grade_thresholds:
    bronze: 0
    silver: 100000
    gold: 500000
    vip: 2000000

# === Phase 48: 검색 엔진 ===
search:
  max_results: 100
  score_weights:
    title: 3
    tags: 2
    description: 1
  autocomplete_popular_top_n: 10

# === Phase 49: 멀티테넌시 ===
tenancy:
  default_plan: free
  plans:
    free:
      monthly_api_calls: 1000
      monthly_orders: 50
      max_products: 100
    basic:
      monthly_api_calls: 10000
      monthly_orders: 500
      max_products: 1000
    pro:
      monthly_api_calls: 100000
      monthly_orders: 5000
      max_products: 10000
    enterprise:
      monthly_api_calls: -1
      monthly_orders: -1
      max_products: -1

# === Phase 50: A/B 테스트 엔진 ===
ab_testing:
  default_variants: [control, treatment]
  min_sample_size: 100
  significance_level: 0.05
  max_experiments: 100

# === Phase 51: 웹훅 관리 ===
webhook_manager:
  max_retries: 5
  base_retry_delay_seconds: 1
  timeout_seconds: 10
  max_webhooks_per_tenant: 50

# === Phase 52: API 문서 자동 생성 ===
api_docs:
  title: "Proxy Commerce API"
  version: "1.0.0"
  enabled: true

# === Phase 53: 구조화된 로깅 + 분산 추적 ===
logging_tracing:
  log_format: json
  max_log_entries: 10000
  trace_header: "X-Trace-Id"
  span_header: "X-Span-Id"

# === Phase 54: 성능 벤치마크 ===
benchmark:
  default_concurrent_users: 10
  default_duration_seconds: 30
  regression_threshold_pct: 20

# === Phase 55: 파일 스토리지 ===
storage:
  backend: local
  local_path: ./data/storage
  max_file_size_mb: 50
  allowed_extensions: [jpg, png, gif, pdf, csv, json]
  quota_default_mb: 1024

# === Phase 56: 이메일 서비스 ===
email_service:
  provider: smtp
  smtp_host: smtp.example.com
  smtp_port: 587
  smtp_user: noreply@example.com
  queue_max_size: 1000
  max_retries: 3

# === Phase 57: 검색 엔진 ===
search_engine:
  max_index_size: 100000
  default_top_k: 10
  suggestion_limit: 5

# === Phase 58: 작업 파이프라인 ===
pipeline:
  max_history: 100
  timeout_seconds: 300
  enable_rollback: true

# === Phase 59: 피쳐 플래그 ===
feature_flags:
  max_flags: 500
  audit_log_size: 10000

# === Phase 60: 외부 연동 허브 ===
integrations:
  health_check_interval_seconds: 60
  sync_timeout_seconds: 30
  max_log_entries: 5000

# === Phase 61: 데이터 백업/복원 ===
backup:
  max_backups: 100
  default_strategy: full
  encryption_enabled: true
  schedule_default: daily

# === Phase 62: 레이트 리미팅 고도화 ===
rate_limiting:
  default_limit: 100
  default_window_seconds: 60
  algorithm: sliding_window

# === Phase 63: CMS ===
cms:
  max_content_items: 10000
  max_versions_per_item: 50
  default_status: draft

# === Phase 64: 이벤트 소싱 ===
event_sourcing:
  max_events: 1000000
  snapshot_interval: 100

# === Phase 65: 캐시 계층 ===
cache_layer:
  l1_maxsize: 1000
  l1_ttl_seconds: 300
  l2_ttl_seconds: 3600
  l2_path: ./data/cache

# === Phase 66: 워크플로 엔진 ===
workflow:
  max_instances: 10000
  max_history_per_instance: 100

# === Phase 67: 실시간 대시보드 ===
realtime:
  max_events_per_channel: 1000
  heartbeat_interval_seconds: 30
  max_connections: 500

# === Phase 68: 데이터 교환 ===
data_exchange:
  max_export_records: 100000
  supported_formats:
    - json
    - csv
  bulk_job_ttl_hours: 24

# === Phase 69: 규칙 엔진 ===
rules_engine:
  max_rules_per_set: 100
  evaluation_timeout_seconds: 5

# === Phase 70: KPI 대시보드 ===
kpi:
  calculation_interval_minutes: 60
  alert_threshold_pct: 10
  history_retention_days: 90

# === Phase 71: 마켓플레이스 동기화 ===
marketplace_sync:
  default_interval_minutes: 60
  max_retry_count: 3
  supported_marketplaces:
    - coupang
    - naver
    - gmarket

# === Phase 72: 보안 강화 ===
security:
  max_sessions_per_user: 5
  session_ttl_hours: 24
  csrf_token_ttl_minutes: 60
  suspicious_login_threshold: 5
  password_policy:
    min_length: 8
    require_uppercase: true
    require_numbers: true
    require_special: true

# === Phase 73: 고객 세그먼트 관리 ===
segmentation:
  auto_rebuild_interval_hours: 24
  max_segments: 100
  builtin_segments:
    - VIP
    - 신규
    - 이탈위험
    - 대량구매
    - 재구매고객

# === Phase 74: 동적 폼 빌더 ===
form_builder:
  max_fields_per_form: 50
  max_submissions_per_form: 10000
  submission_ttl_days: 365

# === Phase 75: 워크플로 엔진 고도화 ===
workflow_engine:
  max_instances: 50000
  max_history_per_instance: 200
  instance_ttl_days: 90

# === Phase 76: 파일 스토리지 추상화 ===
file_storage:
  default_backend: local
  default_quota_gb: 1
  max_file_size_mb: 100
  allowed_content_types:
    - image/jpeg
    - image/png
    - image/gif
    - application/pdf
    - text/csv
    - application/json

# === Phase 77: 이벤트 소싱 고도화 ===
event_sourcing_advanced:
  snapshot_interval: 10
  max_events_per_aggregate: 10000
  replay_batch_size: 100

# === Phase 78: 피처 플래그 고도화 ===
feature_flags_advanced:
  max_flags: 500
  flag_cache_ttl_seconds: 60
  default_rollout_percentage: 100
  history_retention_days: 90

# === Phase 79: 리뷰 분석 ===
review_analytics:
  sentiment_positive_keywords:
    - 좋아요
    - 최고
    - 만족
    - 추천
  sentiment_negative_keywords:
    - 별로
    - 최악
    - 실망
    - 환불

# === Phase 80: 배송비 계산기 ===
shipping_calculator:
  default_carrier: CJ
  free_shipping_threshold: 50000
  zones:
    - domestic
    - international

# === Phase 81: 알림 템플릿 엔진 ===
notification_templates:
  max_versions: 10
  default_channel: telegram
  supported_channels:
    - telegram
    - email
    - slack

# === Phase 82: 결제 복구 ===
payment_recovery:
  max_retry_attempts: 3
  retry_interval_minutes: 60
  recovery_strategies:
    - retry
    - alternative_payment
    - notify_customer

# === Phase 83: 상품 추천 ===
recommendation:
  max_recommendations: 10
  algorithm: collaborative_filtering
  trending_window_days: 7

# === Phase 84: 주문 분할/병합 ===
order_management:
  max_split_parts: 10
  merge_same_customer_only: true

# === Phase 85: 재고 입출고 이력 ===
inventory_transactions:
  transaction_types:
    - inbound
    - outbound
    - adjustment
    - transfer
  history_retention_days: 365
  negative_stock_allowed: false

